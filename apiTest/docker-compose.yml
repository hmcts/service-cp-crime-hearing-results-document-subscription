services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d appdb" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # WARNING - See readme.md for running mssql on macbook with apple chip
  sqledge:
    image: "mcr.microsoft.com/azure-sql-edge:latest"
    platform: linux/amd64
    networks:
      sb-emulator:
        aliases:
          - "sqledge"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ngPassword!"

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    volumes:
      - "./service-bus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "Str0ngPassword!"
      ACCEPT_EULA: "Y"
      SQL_WAIT_INTERVAL: 60
    depends_on:
      - sqledge
    networks:
      sb-emulator:
        aliases:
          - "sb-emulator"

  wiremock:
    image: wiremock/wiremock:3.6.0
    container_name: wiremock
    ports:
      - "9999:8080"
    volumes:
      - ./src/test/resources/mappings:/home/wiremock/mappings
      - ./src/test/resources/__files:/home/wiremock/files
    command:
      - "--global-response-templating"
      - "--verbose"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/__admin/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    # If DOCKER_IMAGE environment variable is set, it will use that published image.
    # When unset (local dev), Docker Compose falls back to building from the Dockerfile.
    image: ${DOCKER_IMAGE:-service-cp-crime-hearing-case-event-subscription:local}
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8082
      DATASOURCE_URL: jdbc:postgresql://db:5432/appdb
      DATASOURCE_USERNAME: postgres
      DATASOURCE_PASSWORD: postgres
      SUBSCRIPTION_OAUTH_ENABLED: true
      MATERIAL_CLIENT_URL: http://wiremock:8080
    depends_on:
      db:
        condition: service_healthy
      wiremock:
        condition: service_healthy
    ports:
      - "8082:8082"
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'cat /dev/null > /dev/tcp/localhost/8082' 2>/dev/null || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

networks:
  sb-emulator:

