services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  # WARNING - See readme.md for running mssql on macbook with apple chip
  sqledge:
    image: "mcr.microsoft.com/azure-sql-edge:latest"
    platform: linux/amd64
    networks:
      sb-emulator:
        aliases:
          - "sqledge"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ngPassword!"

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    volumes:
      - "./service-bus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      SQL_SERVER: sqledge
      MSSQL_SA_PASSWORD: "Str0ngPassword!"
      ACCEPT_EULA: "Y"
      SQL_WAIT_INTERVAL: 60
    depends_on:
      - sqledge
    networks:
      sb-emulator:
        aliases:
          - "sb-emulator"

  wiremock:
    image: wiremock/wiremock:3.13.2
    container_name: wiremock
    ports:
      - "8090:8080"
    volumes:
      - ./src/test/resources/mappings:/home/wiremock/mappings
      - ./src/test/resources/files:/home/wiremock/__files
    command:
      - "--global-response-templating"
      - "--verbose"

  app:
    image: ${DOCKER_IMAGE:-service-cp-crime-hearing-case-event-subscription:local}
    build:
      context: ..
    environment:
      SERVER_PORT: 8082
      DATASOURCE_URL: jdbc:postgresql://db:5432/appdb
      MATERIAL_CLIENT_URL: http://wiremock:8080
    depends_on:
      - db
      - wiremock
    ports:
      - "8082:8082"

networks:
  sb-emulator:

