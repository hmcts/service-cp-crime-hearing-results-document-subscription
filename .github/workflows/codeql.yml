name: CodeQL

on:
  pull_request:
    branches:
      - master
      - main

  schedule:
    - cron: '36 5 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support
        language: [ 'java' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        # Details on CodeQL's query packs refer to : https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: current

      - name: Gradle Build
        run: |
          ./gradlew build cyclonedxBom -x test

      # ℹ️ Command-line programs to run using the OS shell.
      # 📚 See https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsrun
      #   If the (auto)build fails above, remove it and uncomment the following three lines.
      #   modify them (or add more) to build your code if your project, please refer to the EXAMPLE below for guidance.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

      - name: Log generated SBOM Hash
        run: sha256sum build/resources/main/META-INF/sbom/application.cdx.json || true

        # This ensures:
        # - The SBOM is archived with the CodeQL scan output
        # - It's available to download and inspect from the GitHub Actions UI
      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: build/resources/main/META-INF/sbom/application.cdx.json

  DAST:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: current

      - name: Gradle Build
        run: ./gradlew build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: DAST - Build and run containerised app
        run: |
          cd apiTest
          chmod +x ./setup-emulator-certs.sh
          ./setup-emulator-certs.sh
          docker compose -f docker-compose.yml up -d --wait --wait-timeout 600
          curl -sf http://localhost:8082/actuator/health > /dev/null

      - name: DAST - Debug container logs on failure
        if: failure()
        run: |
          cd apiTest
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs --no-color app1 app2 keyvault-emulator servicebus db wiremock || true

      - name: Run OWASP ZAP DAST Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "http://localhost:8082"
          cmd_options: "-a -J zap_report.json -r zap_report.html"

      - name: Upload ZAP HTML Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-html-report
          path: zap_report.html
          if-no-files-found: ignore
