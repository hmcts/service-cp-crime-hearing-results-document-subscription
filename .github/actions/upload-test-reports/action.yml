# Reusable composite action to upload Gradle test reports as workflow artifacts.
# Use with if: always() when calling so reports are uploaded even when tests fail.
# For a web-based view in CI: the workflow also publishes test results to the job summary
# (see publish-unit-test-result-action in ci-build-publish.yml) so metrics appear on the run page.
name: Upload test reports
description: Uploads test reports and JUnit XML as artifacts; run summary is published separately in the workflow
inputs:
  artifact_name:
    description: Name of the uploaded artifact
    required: true
  path:
    description: |
      Paths to reports (multi-line). Typically:
      - build/reports/tests/test/  (or apiTest/build/reports/tests/test/)
      - build/test-results/test/   (or apiTest/build/test-results/test/)
    required: true
runs:
  using: composite
  steps:
    - name: Upload test reports
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.path }}
