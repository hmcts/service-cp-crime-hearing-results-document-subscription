def docker = '/usr/local/bin/docker'
def composeProject = 'integration-test'

tasks.register('composeUp', Exec) {
  description = 'Start integration test Docker stack (postgres + service bus emulator)'
  group = 'Docker'
  workingDir rootDir
  executable docker
  args 'compose', '-p', composeProject, '-f', 'docker/docker-compose.yml',
      'up', '-d', '--wait', '--wait-timeout', '120', '--remove-orphans'
  standardOutput = System.out
  errorOutput = System.err
}

tasks.register('composeDown', Exec) {
  description = 'Stop and remove integration test Docker stack'
  group = 'Docker'
  workingDir rootDir
  executable docker
  args 'compose', '-p', composeProject, '-f', 'docker/docker-compose.yml',
      'down', '--remove-orphans', '--volumes'
  standardOutput = System.out
  errorOutput = System.err
}

tasks.register('dockerTest', Test) {
  description = 'Runs integration tests — start Docker stack first with: docker compose -f docker/docker-compose.yml up -d'
  group = 'Verification'

  testClassesDirs = sourceSets.test.output.classesDirs
  classpath = sourceSets.test.runtimeClasspath

  useJUnitPlatform {
    includeTags 'integration'
  }
}

sourceSets {
  dockerTest {
    java {
      compileClasspath += sourceSets.main.output
      runtimeClasspath += sourceSets.main.output
    }
  }
}

configurations {
  dockerTestImplementation.extendsFrom testImplementation
  dockerTestRuntimeOnly.extendsFrom testRuntimeOnly
}
