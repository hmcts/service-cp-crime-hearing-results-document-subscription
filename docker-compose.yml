# Run the app in Docker (same way as deployment) to reproduce startup issues locally.
# Usage: ./gradlew bootJar && docker compose up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 4550
      DATASOURCE_URL: jdbc:postgresql://db:5432/appdb
      DATASOURCE_USERNAME: postgres
      DATASOURCE_PASSWORD: postgres
      MATERIAL_CLIENT_URL: http://host.docker.internal:8081
      DOCUMENT_SERVICE_URL: http://host.docker.internal:8082
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4550:4550"
